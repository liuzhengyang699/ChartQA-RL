data:
  train_files: null  # set by RL/train.sh from config/paths.json unless TRAIN_FILE is provided
  val_files: null  # set by RL/train.sh from config/paths.json unless VAL_FILE is provided
  prompt_key: prompt
  answer_key: answer
  image_key: images
  max_prompt_length: 2048
  max_response_length: 512
  #for rollout batch size this should be increased on larger GPU clusters
  rollout_batch_size: 2
  val_batch_size: 32
  format_prompt: ./examples/format_prompt/chartQA_action.jinja
  override_chat_template: null
  shuffle: true
  seed: 42
  max_pixels: 4194304
  min_pixels: 262144
  filter_overlong_prompts: false

algorithm:
  adv_estimator: grpo  # current experiment algorithm; RayPPOTrainer is only the PPO-family trainer skeleton from VeRL
  action_mode: structured
  enable_tool_branch: true
  disable_kl: false
  use_kl_loss: true
  kl_penalty: low_var_kl
  kl_coef: 1.0e-2
  online_filtering: false
  filter_low: 0.01
  filter_high: 0.99

worker:
  actor:
  #we can make it smaller
    global_batch_size: 2
    #according to issue: https://github.com/hiyouga/EasyR1/issues/6
    #this reduces VRAM usage, we * 0.5
    micro_batch_size_per_device_for_update: 1
    micro_batch_size_per_device_for_experience: 1
    max_grad_norm: 1.0
    padding_free: false
    ulysses_sequence_parallel_size: 1
    use_torch_compile: false
    model:
      model_path: null  # set by RL/train.sh from config/paths.json unless MODEL_PATH is provided
      enable_gradient_checkpointing: true
      trust_remote_code: false
      freeze_vision_tower: false
    optim:
      lr: 1.0e-6
      weight_decay: 1.0e-2
      strategy: adamw  # {adamw, adamw_bf16}
      lr_warmup_ratio: 0.0
    fsdp:
      enable_full_shard: true
      enable_cpu_offload: false
      enable_rank0_init: true
    offload:
      offload_params: true  # true: more CPU memory; false: more GPU memory
      offload_optimizer: true  # true: more CPU memory; false: more GPU memory
    rl_lora:
      enable: true
      r: 8
      alpha: 16
      dropout: 0.05
      target_modules: ["q_proj", "k_proj", "v_proj", "o_proj"]

  rollout:
    n: 1
    temperature: 1
    top_p: 0.99
    gpu_memory_utilization: 0.4
    enforce_eager: false
    enable_chunked_prefill: false
    tensor_parallel_size: 4
    limit_images: 2
    val_override_config:
      temperature: 0.5
      n: 1

  ref:
    fsdp:
      enable_full_shard: true
      enable_cpu_offload: false  # true: more CPU memory; false: more GPU memory
      enable_rank0_init: true
    offload:
      offload_params: true

  reward:
    reward_type: structured_chartqa
    reward_function: ./examples/reward_function/structured_chartqa.py:compute_structured_scores
    rule_weight: 0.4
    judge_weight: 0.6
    tool_gain_weight: 0.75
    invalid_penalty: 1.0
    ineffective_penalty: 0.25
    judge_cache_path: ./judge/cache/structured_chartqa_judge_cache.jsonl

trainer:
  total_epochs: 2000
  max_steps: 2000
  project_name: chartqa_rl
  experiment_name: qwen3vl4b_chartqa_rl
  logger: ["console"]
  nnodes: 1
  n_gpus_per_node: 4
  val_freq: 100  # -1 to disable
  val_before_train: true
  val_only: false
  save_freq: 200  # -1 to disable
  save_limit: 2  # -1 to disable
  save_checkpoint_path: null  # set by RL/train.sh from config/paths.json unless CHECKPOINT_DIR is provided
  load_checkpoint_path: null
  trace:
    enable: false
    output_dir: null
    sample_size_per_step: 64
    save_images: true
    max_steps: 200
  replay:
    enable: false
    buffer_dir: null  # set by RL/train.sh to rl_parquet_dir/replay unless REPLAY_BUFFER_DIR is provided
    buffer_size: 50000
    min_final_mix: 0.8
    min_tool_gain: 0.1
    supervised_batch_size: 8
    loss_weight_action: 0.4
    loss_weight_answer: 0.6
